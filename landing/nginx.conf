server {
    listen 80 default_server;
    server_name _;

    # Static pages
    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
        default_type text/html;
    }
    location = /join {
        root /usr/share/nginx/html;
        try_files /join.html =404;
        default_type text/html;
    }
    location = /join.html {
        root /usr/share/nginx/html;
        try_files /join.html =404;
        default_type text/html;
    }
    location = /signup {
        root /usr/share/nginx/html;
        try_files /signup.html =404;
        default_type text/html;
    }
    location = /signup.html {
        root /usr/share/nginx/html;
        try_files /signup.html =404;
        default_type text/html;
    }
    location = /responder.py {
        root /usr/share/nginx/html;
        try_files /responder.py =404;
        default_type text/plain;
    }
    location = /sas_verification.py {
        root /usr/share/nginx/html;
        try_files /sas_verification.py =404;
        default_type text/plain;
    }

    # Signup API → knock-approver service (port 8001)
    location = /signup/api {
        proxy_pass http://knock-approver:8001/signup/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 1m;
    }

    # Cross-signing bootstrap endpoint (same approver service)
    location = /signup/api/crosssign {
        proxy_pass http://knock-approver:8001/signup/api/crosssign;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 1m;
    }

    # Lobby door — mints a fresh per-code public lobby room
    location = /join/api {
        proxy_pass http://knock-approver:8001/join/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 1m;
    }

    # Everything else → continuwuity
    location / {
        proxy_pass http://continuwuity:6167;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_buffering off;
        client_max_body_size 50m;
    }
}
