server {
    listen 80 default_server;
    server_name _;

    # Static pages
    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
        default_type text/html;
    }
    location = /join {
        root /usr/share/nginx/html;
        try_files /join.html =404;
        default_type text/html;
    }
    location = /join.html {
        root /usr/share/nginx/html;
        try_files /join.html =404;
        default_type text/html;
    }
    location = /signup {
        root /usr/share/nginx/html;
        try_files /signup.html =404;
        default_type text/html;
    }
    location = /signup.html {
        root /usr/share/nginx/html;
        try_files /signup.html =404;
        default_type text/html;
    }

    # curl | bash agent-onboarding one-liner
    location = /bootstrap.sh {
        root /usr/share/nginx/html;
        try_files /bootstrap.sh =404;
        default_type text/x-shellscript;
    }

    # Signup API → knock-approver service (port 8001)
    location = /signup/api {
        proxy_pass http://knock-approver:8001/signup/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 1m;
    }

    # Everything else → continuwuity
    location / {
        proxy_pass http://continuwuity:6167;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_buffering off;
        client_max_body_size 50m;
    }
}
