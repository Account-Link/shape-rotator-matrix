name: deploy

# Auto-deploy mtrx.shaperotator.xyz on every push to main, gated on the
# e2e test workflow. To trigger an out-of-band deploy (rotating a secret,
# emergency push), use the "Run workflow" button (workflow_dispatch).
#
# Required GitHub secrets — set under Settings → Secrets and variables →
# Actions:
#
#   PHALA_API_KEY            phala CLI api token; deploys against the cvm
#   NAMECHEAP_USERNAME       DNS-01 LE creds for dstack-ingress
#   NAMECHEAP_API_KEY        ditto
#   REGISTRATION_TOKEN       continuwuity registration token
#   KNOCK_APPROVER_TOKEN     access token of @shape-rotator-2 (PL ≥ 50 in space)
#   DSTACK_AUTHORIZED_KEYS   ssh authorized_keys for the CVM (one line)
#   ONBOARDING_INVITER_MXID  e.g. @socrates1024:matrix.org
#   SHAPEROTATOR_SPACE_ID    !4FL8uL5OEYL...mm-g (unsuffixed)
#   SPACE_CHILD_IDS          comma-separated unsuffixed child ids
#   INITIAL_CODES            JSON, can be {} (no extra knock codes)
#   INITIAL_SIGNUP_CODES     JSON, can be {} (no extra signup codes)
#
# The CVM ID `dstack-matrix` is the name on the Phala dashboard. Change it
# below if the CVM is renamed or replaced.

# Deploys are tag-triggered by design. Pushing to main no longer touches
# prod — push a tag matching v* (e.g. `git tag v0.3 && git push --tags`)
# to roll out, or use the "Run workflow" button (workflow_dispatch) for an
# out-of-band deploy. This puts release timing in operator hands so a
# routine README PR doesn't surprise the homeserver with a CVM recreate.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  e2e:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install phala CLI
        run: npm install -g phala

      - name: build .env
        env:
          NAMECHEAP_USERNAME: ${{ secrets.NAMECHEAP_USERNAME }}
          NAMECHEAP_API_KEY: ${{ secrets.NAMECHEAP_API_KEY }}
          REGISTRATION_TOKEN: ${{ secrets.REGISTRATION_TOKEN }}
          KNOCK_APPROVER_TOKEN: ${{ secrets.KNOCK_APPROVER_TOKEN }}
          DSTACK_AUTHORIZED_KEYS: ${{ secrets.DSTACK_AUTHORIZED_KEYS }}
          ONBOARDING_INVITER_MXID: ${{ secrets.ONBOARDING_INVITER_MXID }}
          SHAPEROTATOR_SPACE_ID: ${{ secrets.SHAPEROTATOR_SPACE_ID }}
          SPACE_CHILD_IDS: ${{ secrets.SPACE_CHILD_IDS }}
          INITIAL_CODES: ${{ secrets.INITIAL_CODES }}
          INITIAL_SIGNUP_CODES: ${{ secrets.INITIAL_SIGNUP_CODES }}
          ADMIN_ALLOWLIST: ${{ secrets.ADMIN_ALLOWLIST }}
          ADMIN_COMMAND_ROOM: ${{ secrets.ADMIN_COMMAND_ROOM }}
        run: |
          {
            echo "NAMECHEAP_USERNAME=$NAMECHEAP_USERNAME"
            echo "NAMECHEAP_API_KEY=$NAMECHEAP_API_KEY"
            echo "REGISTRATION_TOKEN=$REGISTRATION_TOKEN"
            echo "KNOCK_APPROVER_TOKEN=$KNOCK_APPROVER_TOKEN"
            echo "DSTACK_AUTHORIZED_KEYS=$DSTACK_AUTHORIZED_KEYS"
            echo "ONBOARDING_INVITER_MXID=$ONBOARDING_INVITER_MXID"
            echo "SHAPEROTATOR_SPACE_ID=$SHAPEROTATOR_SPACE_ID"
            echo "SPACE_CHILD_IDS=$SPACE_CHILD_IDS"
            echo "INITIAL_CODES=$INITIAL_CODES"
            echo "INITIAL_SIGNUP_CODES=$INITIAL_SIGNUP_CODES"
            echo "ADMIN_ALLOWLIST=$ADMIN_ALLOWLIST"
            echo "ADMIN_COMMAND_ROOM=$ADMIN_COMMAND_ROOM"
          } > .env
          bash deploy/encode_env.sh

      - name: phala deploy
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_API_KEY }}
        run: |
          # phala deploy --wait polls for ~300s; if the Phala backend is
          # slow it can leave the CVM `stopped` and exit nonzero. Don't
          # let that strand prod — capture the rc, then if the CVM is
          # stopped, kick it back up ourselves.
          set +e
          phala deploy \
            --api-token "$PHALA_CLOUD_API_KEY" \
            --cvm-id dstack-matrix \
            --compose docker-compose.yml \
            --env-file .env \
            --wait
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "::warning::phala deploy --wait exited $rc; checking CVM status"
            STATUS=$(phala cvms list --api-token "$PHALA_CLOUD_API_KEY" 2>&1 \
              | awk '/dstack-matrix/{print $3; exit}')
            echo "CVM status: $STATUS"
            if [ "$STATUS" = "stopped" ] || [ "$STATUS" = "starting" ]; then
              echo "::warning::CVM is $STATUS — issuing phala cvms start as recovery"
              phala cvms start dstack-matrix --api-token "$PHALA_CLOUD_API_KEY"
            fi
            # Poll until running or fail hard (60 * 5s = 5 min ceiling).
            for i in $(seq 1 60); do
              STATUS=$(phala cvms list --api-token "$PHALA_CLOUD_API_KEY" 2>&1 \
                | awk '/dstack-matrix/{print $3; exit}')
              echo "[recovery $i/60] cvm: $STATUS"
              [ "$STATUS" = "running" ] && break
              sleep 5
            done
            if [ "$STATUS" != "running" ]; then
              echo "::error::CVM still not running after recovery — manual intervention needed"
              exit 1
            fi
          fi

      - name: post-deploy health check
        env:
          KNOCK_APPROVER_TOKEN: ${{ secrets.KNOCK_APPROVER_TOKEN }}
        run: |
          # Fail loudly if the homeserver isn't actually serving traffic
          # after deploy. Avoids declaring success when the CVM came up
          # but continuwuity / nginx are wedged.
          for i in $(seq 1 30); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' \
              https://mtrx.shaperotator.xyz/_matrix/client/versions || true)
            echo "[health $i/30] /versions=$code"
            [ "$code" = "200" ] && break
            sleep 5
          done
          if [ "$code" != "200" ]; then
            echo "::error::homeserver not returning 200 on /versions"
            exit 1
          fi
          # Bot health: /whoami should return @shape-rotator-2.
          who=$(curl -sS -H "Authorization: Bearer $KNOCK_APPROVER_TOKEN" \
            https://mtrx.shaperotator.xyz/_matrix/client/v3/account/whoami \
            | python3 -c "import json,sys; print(json.load(sys.stdin).get('user_id','?'))")
          echo "bot whoami: $who"
          if [ "$who" != "@shape-rotator-2:mtrx.shaperotator.xyz" ]; then
            echo "::error::bot token not authenticating as @shape-rotator-2"
            exit 1
          fi

      - name: post deploy note to #matrix-devops
        if: success()
        env:
          KNOCK_APPROVER_TOKEN: ${{ secrets.KNOCK_APPROVER_TOKEN }}
          ADMIN_COMMAND_ROOM: ${{ secrets.ADMIN_COMMAND_ROOM }}
          GH_SHA: ${{ github.sha }}
          GH_MSG: ${{ github.event.head_commit.message }}
          GH_RUN: ${{ github.run_id }}
        run: |
          if [ -z "${ADMIN_COMMAND_ROOM:-}" ] || [ -z "${KNOCK_APPROVER_TOKEN:-}" ]; then
            echo "ADMIN_COMMAND_ROOM or KNOCK_APPROVER_TOKEN not set; skipping post"
            exit 0
          fi
          ROOM_ENC=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))" "$ADMIN_COMMAND_ROOM")
          BODY=$(python3 - <<'PY'
          import json, os
          sha = os.environ.get("GH_SHA", "")[:7]
          msg = os.environ.get("GH_MSG", "(no commit message)")
          run = os.environ.get("GH_RUN", "")
          body = f"🚀 deployed {sha} to dstack-matrix\n\n{msg}\n\nrun: https://github.com/Account-Link/shape-rotator-matrix/actions/runs/{run}"
          print(json.dumps({"msgtype": "m.text", "body": body}))
          PY
          )
          curl -fsS -X PUT \
            -H "Authorization: Bearer $KNOCK_APPROVER_TOKEN" \
            -H 'Content-Type: application/json' \
            "https://mtrx.shaperotator.xyz/_matrix/client/v3/rooms/$ROOM_ENC/send/m.room.message/deploy-$GH_RUN" \
            -d "$BODY"
